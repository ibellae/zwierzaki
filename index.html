<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#f0f4ff">
    <title>Zwierzaki</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(180deg, #e8f0fe 0%, #f0f4ff 50%, #fef9ef 100%);
            color: #333;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            position: relative;
            z-index: 10;
        }

        .list-toggle {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: #fff;
            color: #666;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            -webkit-tap-highlight-color: transparent;
        }

        .mic-indicator {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: #fff;
            color: #999;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            -webkit-tap-highlight-color: transparent;
            position: relative;
            transition: all 0.3s ease;
        }

        .mic-indicator.listening {
            color: #e91e63;
            box-shadow: 0 2px 12px rgba(233, 30, 99, 0.25);
        }

        .mic-indicator.listening::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 2px solid #e91e63;
            animation: mic-pulse 1.5s infinite;
        }

        .mic-indicator.muted {
            color: #ccc;
            background: #f5f5f5;
        }

        @keyframes mic-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.15); }
        }

        .animal-display {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 20px 8px;
        }

        .animal-image-container {
            width: 60vw;
            height: 60vw;
            max-width: 280px;
            max-height: 280px;
            border-radius: 32px;
            overflow: hidden;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .animal-image-container.playing {
            transform: scale(1.04);
            box-shadow: 0 8px 30px rgba(255, 152, 0, 0.25);
        }

        .animal-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .placeholder-icon {
            font-size: 72px;
        }

        .animal-name {
            font-size: 26px;
            font-weight: 800;
            margin-top: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            color: #2d3748;
        }

        .status-text {
            font-size: 15px;
            color: #888;
            margin-top: 6px;
            text-align: center;
            min-height: 22px;
        }

        .controls {
            padding: 10px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .hint {
            font-size: 13px;
            color: #aaa;
            text-align: center;
        }

        .search-bar {
            display: flex;
            gap: 8px;
            width: 100%;
            max-width: 360px;
        }

        .search-bar input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 16px;
            border: 2px solid #e0e0e0;
            background: #fff;
            color: #333;
            font-size: 16px;
            outline: none;
            -webkit-appearance: none;
        }

        .search-bar input:focus {
            border-color: #ff9800;
        }

        .search-bar input::placeholder {
            color: #bbb;
        }

        .search-bar button {
            padding: 10px 18px;
            border-radius: 16px;
            border: none;
            background: #ff9800;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .no-speech .mic-indicator,
        .no-speech .hint { display: none; }

        .animal-list-overlay {
            position: fixed;
            inset: 0;
            background: #f5f7fa;
            z-index: 100;
            display: none;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
        }

        .animal-list-overlay.open {
            display: flex;
        }

        .animal-list-header {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            border-bottom: 1px solid #eee;
        }

        .animal-list-header h2 {
            font-size: 18px;
            color: #333;
        }

        .close-list {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #f0f0f0;
            color: #666;
            font-size: 18px;
            cursor: pointer;
        }

        .animal-list-search {
            padding: 10px 16px;
            background: #fff;
            border-bottom: 1px solid #eee;
        }

        .animal-list-search input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 12px;
            border: 2px solid #e8e8e8;
            background: #f8f8f8;
            color: #333;
            font-size: 16px;
            outline: none;
        }

        .animal-list-search input:focus {
            border-color: #ff9800;
        }

        .animal-grid {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            align-content: start;
            -webkit-overflow-scrolling: touch;
        }

        .animal-tile {
            aspect-ratio: 1;
            border-radius: 16px;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 6px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            transition: transform 0.15s;
            -webkit-tap-highlight-color: transparent;
        }

        .animal-tile:active {
            transform: scale(0.95);
        }

        .animal-tile .tile-emoji {
            font-size: 28px;
            margin-bottom: 2px;
        }

        .animal-tile .tile-name {
            font-size: 10px;
            text-align: center;
            color: #666;
            line-height: 1.2;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <button class="list-toggle" onclick="toggleList()">&#x1f4cb;</button>
        <button class="mic-indicator muted" id="micBtn" onclick="toggleMic()">&#x1f3a4;</button>
    </div>

    <div class="animal-display">
        <div class="animal-image-container" id="imageContainer">
            <div class="placeholder-icon">&#x1f43e;</div>
        </div>
        <div class="animal-name" id="animalName">Powiedz zwierze</div>
        <div class="status-text" id="statusText">Tapnij mikrofon aby zaczac</div>
    </div>

    <div class="controls">
        <div class="hint" id="hintText">Powiedz np. "jak brzmi krowa"</div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Wpisz zwierze..."
                   enterkeyhint="go" autocomplete="off" autocorrect="off">
            <button onclick="searchAnimal()">&#x27a4;</button>
        </div>
    </div>

    <div class="animal-list-overlay" id="animalList">
        <div class="animal-list-header">
            <h2>Wszystkie zwierzeta</h2>
            <button class="close-list" onclick="toggleList()">&#x2715;</button>
        </div>
        <div class="animal-list-search">
            <input type="text" id="listSearchInput" placeholder="Szukaj..." oninput="filterList()">
        </div>
        <div class="animal-grid" id="animalGrid"></div>
    </div>

    <script src="animals.js"></script>
    <script src="app.js"></script>
</body>
</html>
