<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>Zwierzęta</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        .animal-display {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .animal-image-container {
            width: 80vw;
            height: 80vw;
            max-width: 400px;
            max-height: 400px;
            border-radius: 24px;
            overflow: hidden;
            background: #16213e;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .animal-image-container.playing {
            transform: scale(1.05);
            box-shadow: 0 20px 60px rgba(79, 172, 254, 0.3);
        }

        .animal-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .placeholder-icon {
            font-size: 80px;
            opacity: 0.3;
        }

        .animal-name {
            font-size: 36px;
            font-weight: 700;
            margin-top: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        .animal-name-latin {
            font-size: 14px;
            opacity: 0.5;
            margin-top: 4px;
        }

        .status-text {
            font-size: 16px;
            opacity: 0.6;
            margin-top: 12px;
            text-align: center;
            min-height: 24px;
        }

        .controls {
            padding: 20px 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .mic-button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #fff;
            font-size: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(79, 172, 254, 0.4);
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .mic-button:active {
            transform: scale(0.95);
        }

        .mic-button.listening {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            box-shadow: 0 8px 32px rgba(245, 87, 108, 0.4);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .hint {
            font-size: 14px;
            opacity: 0.4;
            text-align: center;
        }

        .search-bar {
            display: flex;
            gap: 8px;
            width: 100%;
            max-width: 400px;
        }

        .search-bar input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 16px;
            outline: none;
            -webkit-appearance: none;
        }

        .search-bar input:focus {
            border-color: rgba(79, 172, 254, 0.5);
        }

        .search-bar input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .search-bar button {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .no-speech .mic-button,
        .no-speech .hint { display: none; }
        .no-speech .search-bar { margin-top: 8px; }

        .replay-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .replay-btn.visible {
            display: flex;
        }

        .list-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .animal-list-overlay {
            position: fixed;
            inset: 0;
            background: #1a1a2e;
            z-index: 100;
            display: none;
            flex-direction: column;
        }

        .animal-list-overlay.open {
            display: flex;
        }

        .animal-list-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .animal-list-header h2 {
            font-size: 20px;
        }

        .close-list {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
        }

        .animal-list-search {
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .animal-list-search input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        .animal-grid {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            align-content: start;
            -webkit-overflow-scrolling: touch;
        }

        .animal-tile {
            aspect-ratio: 1;
            border-radius: 12px;
            background: #16213e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 8px;
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .animal-tile:active {
            background: #1f3460;
        }

        .animal-tile .tile-emoji {
            font-size: 32px;
            margin-bottom: 4px;
        }

        .animal-tile .tile-name {
            font-size: 11px;
            text-align: center;
            opacity: 0.8;
            line-height: 1.2;
        }
    </style>
</head>
<body>
    <div class="animal-display">
        <button class="list-toggle" onclick="toggleList()">&#x1f4cb;</button>
        <button class="replay-btn" id="replayBtn" onclick="replaySound()">&#x1f50a;</button>

        <div class="animal-image-container" id="imageContainer">
            <div class="placeholder-icon">&#x1f43e;</div>
        </div>
        <div class="animal-name" id="animalName">Powiedz zwierzę</div>
        <div class="status-text" id="statusText">Naciśnij mikrofon i powiedz nazwę zwierzęcia</div>
    </div>

    <div class="controls">
        <button class="mic-button" id="micBtn" onclick="toggleListening()">&#x1f3a4;</button>
        <div class="hint">Naciśnij i powiedz np. "krowa" lub "niedźwiedź"</div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Wpisz nazwę zwierzęcia..."
                   enterkeyhint="go" autocomplete="off" autocorrect="off">
            <button onclick="searchAnimal()">&#x27a4;</button>
        </div>
    </div>

    <div class="animal-list-overlay" id="animalList">
        <div class="animal-list-header">
            <h2>Wszystkie zwierzęta</h2>
            <button class="close-list" onclick="toggleList()">&#x2715;</button>
        </div>
        <div class="animal-list-search">
            <input type="text" id="listSearchInput" placeholder="Szukaj..." oninput="filterList()">
        </div>
        <div class="animal-grid" id="animalGrid"></div>
    </div>

    <script src="animals.js"></script>
    <script src="app.js"></script>
</body>
</html>
